<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronos // Slot Booking</title>
  <meta name="description" content="Chronos Slot Booking Engine — high-frequency scheduling for professionals and service providers." />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar">
    <div class="nav-inner">
      <span class="logo">CHRONOS</span>
      <div class="nav-links">
        <button class="nav-btn active" data-section="home">Dashboard</button>
        <button class="nav-btn" data-section="available">Available</button>
        <button class="nav-btn" data-section="booked">
          My Bookings
          <span id="booked-badge" class="badge hidden">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Main Content -->
  <main id="app">
    <!-- Dashboard Section -->
    <section id="section-home" class="section fade-in">
      <header class="section-header">
        <h1>Overview</h1>
        <p class="subtitle">Real-time availability and booking metrics.</p>
      </header>
      <div class="stat-grid">
        <div class="stat-card">
          <span class="stat-label">Total Slots</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Available</span>
          <span class="stat-value stat-emerald" id="stat-available">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Your Bookings</span>
          <span class="stat-value stat-rose" id="stat-booked">0</span>
        </div>
      </div>
    </section>

    <!-- Available Slots Section -->
    <section id="section-available" class="section hidden">
      <header class="section-header">
        <div class="header-row">
          <h1>Available Slots</h1>
          <div class="filters">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <input type="date" id="filter-date" />
            </div>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="filter-search" placeholder="Search ID or Time..." />
            </div>
          </div>
        </div>
      </header>
      <div id="available-grid" class="slot-grid"></div>
      <div id="available-empty" class="empty-state hidden">No available slots found matching your criteria.</div>
    </section>

    <!-- Booked Slots Section -->
    <section id="section-booked" class="section hidden">
      <header class="section-header">
        <h1>My Bookings</h1>
        <p class="subtitle">Manage your upcoming appointments.</p>
      </header>
      <div id="booked-grid" class="slot-grid"></div>
      <div id="booked-empty" class="empty-state hidden">You haven't booked any slots yet.</div>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
